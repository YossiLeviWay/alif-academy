name: Migrate to Firebase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm you want to run the migration'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'migrate' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          NEON_URL: ${{ secrets.NEON_URL }}
        run: npm run migrate
